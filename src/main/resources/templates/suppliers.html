<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head(title='Fornecedores - Tahi Glass ERP')}"></head>
<body class="bg-slate-50 dark:bg-[#0B1120] flex font-sans text-slate-800 dark:text-slate-200">

<div th:replace="~{fragments/layout :: sidebar}"></div>
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="lg:ml-72 px-4 sm:px-6 lg:px-8 pb-4 sm:pb-6 lg:pb-8 pt-20 lg:pt-8 w-full min-h-screen transition-colors duration-300">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-200 dark:border-slate-800/80 pb-5 gap-4">
        <div>
            <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Fornecedores</h2>
            <p class="text-base text-slate-500 dark:text-slate-400 mt-1">Controle de parceiros, distribuidores de vidro, perfis e acessórios.</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-brand-600 hover:bg-brand-700 text-white dark:bg-cyan-500 dark:hover:bg-cyan-600 dark:text-slate-900 font-bold px-6 py-3 rounded-xl flex items-center gap-2 transition-all shadow-md shadow-brand-500/20 dark:shadow-cyan-500/20">
            <i data-lucide="truck" class="w-5 h-5"></i> Novo Fornecedor
        </button>
    </header>

    <div class="bg-white dark:bg-[#131C2F] rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[680px]">
            <thead>
            <tr class="border-b border-slate-200 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/80 text-slate-500 dark:text-slate-400 font-bold text-sm uppercase tracking-wider">
                <th class="p-5">Empresa / Distribuidora</th>
                <th class="p-5">CNPJ / CPF</th>
                <th class="p-5">Contato</th>
                <th class="p-5">Especialidade</th>
                <th class="p-5 text-center">Ações</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-700/50 text-sm">
            <tr th:each="sup : ${suppliers}" class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                <td class="p-5 font-bold text-slate-900 dark:text-white text-base" th:text="${sup.name}">Nome do Fornecedor</td>
                <td class="p-5 text-slate-600 dark:text-slate-300 font-mono" th:text="${sup.document}">00.000.000/0001-00</td>
                <td class="p-5">
                    <div class="text-slate-700 dark:text-slate-300 font-medium" th:text="${sup.email}">comercial@fornecedor.com</div>
                    <div class="text-slate-500 text-sm mt-1" th:text="${sup.phone}">(11) 4002-8922</div>
                </td>
                <td class="p-5">
                    <span class="px-3 py-1.5 rounded-lg text-xs font-bold bg-brand-100 text-brand-700 dark:bg-cyan-500/10 dark:text-cyan-400 uppercase border border-brand-200 dark:border-transparent"
                          th:text="${sup.category != null && !sup.category.isEmpty() ? sup.category : 'Geral'}">Vidros</span>
                </td>
                <td class="p-5 text-center space-x-3">
                    <a th:href="@{/suppliers/edit/{id}(id=${sup.id})}" class="text-brand-600 hover:text-brand-800 dark:text-cyan-400 dark:hover:text-cyan-300 p-2 rounded-lg hover:bg-brand-50 dark:hover:bg-cyan-500/10 transition-colors" title="Editar">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </a>
                    <form th:action="@{/suppliers/delete/{id}(id=${sup.id})}" method="POST" class="inline-block">
                        <button type="submit" onclick="return confirm('Excluir fornecedor?')" class="text-rose-600 hover:text-rose-800 dark:text-rose-500 dark:hover:text-rose-400 p-2 rounded-lg hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-colors" title="Excluir">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(suppliers)}">
                <td colspan="5" class="p-10 text-center text-slate-500 font-medium text-base">Nenhum fornecedor localizado.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div id="supplierModal" th:class="${isEditing} ? 'fixed inset-0 bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto' : 'fixed inset-0 bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4 overflow-y-auto'">
        <div class="bg-white dark:bg-[#131C2F] border border-slate-200 dark:border-slate-700 w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <header class="p-6 border-b border-slate-200 dark:border-slate-700/50 flex justify-between items-center bg-slate-50 dark:bg-slate-800/30">
                <h3 class="text-xl font-bold text-slate-900 dark:text-white" th:text="${isEditing} ? 'Editar Fornecedor' : 'Cadastrar Fornecedor'">Formulário</h3>
                <a href="/suppliers" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 bg-white dark:bg-transparent p-1.5 rounded-lg border border-slate-200 dark:border-transparent">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </a>
            </header>

            <form th:action="@{/suppliers/save}" th:object="${newSupplier}" method="POST" class="p-6 space-y-5">
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Razão Social / Nome Fantasia</label>
                        <input type="text" th:field="*{name}" required class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-brand-500 dark:focus:border-cyan-500 transition-all text-base" />
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5 uppercase tracking-wider">CNPJ / CPF</label>
                        <input type="text" th:field="*{document}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-brand-500 dark:focus:border-cyan-500 transition-all text-base" />
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Especialidade</label>
                        <select th:field="*{category}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-brand-500 dark:focus:border-cyan-500 transition-all text-base">
                            <option value="Vidros">Distribuidor de Vidros</option>
                            <option value="Alumínios">Perfis de Alumínio</option>
                            <option value="Acessórios/Ferragens">Ferragens e Acessórios</option>
                            <option value="Consumíveis">Consumíveis (Silicones/Buchas)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5 uppercase tracking-wider">E-mail</label>
                        <input type="email" th:field="*{email}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-brand-500 dark:focus:border-cyan-500 transition-all text-base" />
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Telefone</label>
                        <input type="text" th:field="*{phone}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-brand-500 dark:focus:border-cyan-500 transition-all text-base" />
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Cidade</label>
                        <input type="text" th:field="*{city}" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-brand-500 dark:focus:border-cyan-500 transition-all text-base" />
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-5 border-t border-slate-200 dark:border-slate-700 mt-8">
                    <a href="/suppliers" class="px-5 py-3 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors font-bold text-base">Cancelar</a>
                    <button type="submit" class="px-5 py-3 rounded-xl bg-brand-600 hover:bg-brand-700 text-white dark:bg-cyan-500 dark:hover:bg-cyan-600 dark:text-slate-900 font-black transition-all shadow-md shadow-brand-500/20 dark:shadow-cyan-500/20 text-base">Salvar Fornecedor</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    function toggleModal(show) {
        const modal = document.getElementById('supplierModal');
        if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        else { modal.classList.remove('flex'); modal.classList.add('hidden'); }
    }
</script>
<div th:replace="~{fragments/layout :: lucide-script}"></div>
</body>
</html>
