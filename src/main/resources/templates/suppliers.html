<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Fornecedores - Alfatahi ERP')}"></head>
<body class="bg-slate-900 flex">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<main class="ml-64 p-8 w-full min-h-screen text-slate-200">
    <header class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-bold text-white">Fornecedores</h2>
            <p class="text-slate-400">Controle de parceiros, distribuidores de vidro, perfis e acessórios.</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-semibold px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
            <i data-lucide="truck" class="w-5 h-5"></i> Novo Fornecedor
        </button>
    </header>

    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="border-b border-slate-700 bg-slate-800/50 text-slate-400 font-semibold text-sm">
                <th class="p-4">Empresa / Distribuidora</th>
                <th class="p-4">CNPJ / CPF</th>
                <th class="p-4">Contato</th>
                <th class="p-4">Especialidade</th>
                <th class="p-4 text-center">Ações</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-700 text-sm">
            <tr th:each="sup : ${suppliers}" class="hover:bg-slate-700/30 transition-colors">
                <td class="p-4 font-medium text-white" th:text="${sup.name}">Nome do Fornecedor</td>
                <td class="p-4 text-slate-300" th:text="${sup.document}">00.000.000/0001-00</td>
                <td class="p-4">
                    <div class="text-slate-300" th:text="${sup.email}">comercial@fornecedor.com</div>
                    <div class="text-slate-500 text-xs" th:text="${sup.phone}">(11) 4002-8922</div>
                </td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded-full text-xs font-semibold bg-cyan-500/10 text-cyan-400" th:text="${sup.category != null && !sup.category.isEmpty() ? sup.category : 'Geral'}">Vidros</span>
                </td>
                <td class="p-4 text-center space-x-2">
                    <a th:href="@{/suppliers/edit/{id}(id=${sup.id})}" class="text-cyan-400 hover:text-cyan-300 inline-block">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </a>
                    <a th:href="@{/suppliers/delete/{id}(id=${sup.id})}" onclick="return confirm('Excluir fornecedor?')" class="text-rose-400 hover:text-rose-300 inline-block">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(suppliers)}">
                <td colspan="5" class="p-8 text-center text-slate-500">Nenhum fornecedor localizado.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="supplierModal" th:class="${isEditing} ? 'fixed inset-0 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center z-50' : 'fixed inset-0 bg-slate-950/70 backdrop-blur-sm hidden items-center justify-center z-50'">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-xl rounded-xl shadow-2xl overflow-hidden">
            <header class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h3 class="text-xl font-bold text-white" th:text="${isEditing} ? 'Editar Fornecedor' : 'Cadastrar Fornecedor'">Formulário</h3>
                <a href="/suppliers" class="text-slate-400 hover:text-slate-200"><i data-lucide="x" class="w-6 h-6"></i></a>
            </header>

            <form th:action="@{/suppliers/save}" th:object="${newSupplier}" method="POST" class="p-6 space-y-4">
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Razão Social / Nome Fantasia</label>
                        <input type="text" th:field="*{name}" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">CNPJ / CPF</label>
                        <input type="text" th:field="*{document}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Especialidade / Categoria</label>
                        <select th:field="*{category}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none">
                            <option value="Vidros">Distribuidor de Vidros</option>
                            <option value="Alumínios">Perfis de Alumínio</option>
                            <option value="Acessórios/Ferragens">Ferragens e Acessórios</option>
                            <option value="Consumíveis">Consumíveis (Silicones/Buchas)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">E-mail</label>
                        <input type="email" th:field="*{email}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Telefone</label>
                        <input type="text" th:field="*{phone}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Cidade</label>
                        <input type="text" th:field="*{city}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-slate-700 mt-6">
                    <a href="/suppliers" class="px-4 py-2 rounded-lg bg-slate-700 text-white hover:bg-slate-600 transition-colors">Cancelar</a>
                    <button type="submit" class="px-4 py-2 rounded-lg bg-cyan-500 text-slate-900 font-semibold hover:bg-cyan-600 transition-colors">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    function toggleModal(show) {
        const modal = document.getElementById('supplierModal');
        if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        else { modal.classList.remove('flex'); modal.classList.add('hidden'); }
    }
</script>
<div th:replace="~{fragments/layout :: lucide-script}"></div>
</body>
</html>
