<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title th:text="${title}">Tahi Glass ERP</title>

    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7', // Azul corporativo
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Transições suaves para mudança de tema */
        html.transition-theme * {
            transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-[#0B1120] dark:text-slate-200 antialiased">

<div th:fragment="sidebar" class="w-72 bg-white dark:bg-slate-900 h-screen fixed left-0 top-0 border-r border-slate-200 dark:border-slate-800 shadow-xl flex flex-col z-40">

    <div class="p-6 shrink-0">
        <div class="flex items-center gap-4 pl-2">
            <div class="bg-brand-50 dark:bg-gradient-to-br dark:from-cyan-400 dark:to-blue-500 p-2.5 rounded-xl shadow-sm border border-brand-100 dark:border-none">
                <i data-lucide="layers" class="text-brand-600 dark:text-slate-900 w-7 h-7"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Tahi Glass</h1>
        </div>
    </div>

    <nav class="flex-1 overflow-y-auto px-5 py-2 space-y-1 scrollbar-thin scrollbar-thumb-slate-200 dark:scrollbar-thumb-slate-700">

        <div class="px-3 pt-3 pb-2 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Setor Comercial</div>
        <a href="/commercial" th:classappend="${currentPage == 'commercial'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
            <i data-lucide="line-chart" class="w-4 h-4"></i> Dashboard Vendas
        </a>
        <a href="/quotes" th:classappend="${currentPage == 'quotes'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
            <i data-lucide="file-signature" class="w-4 h-4"></i> Orçamentos
        </a>
        <a href="/agenda" th:classappend="${currentPage == 'agenda'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
            <i data-lucide="calendar-clock" class="w-4 h-4"></i> Agenda Comercial
        </a>
        <a href="/clients" th:classappend="${currentPage == 'clients'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
            <i data-lucide="users" class="w-4 h-4"></i> Clientes
        </a>

        <div sec:authorize="hasRole('GESTAO')" class="space-y-1">
            <div class="px-3 pt-6 pb-2 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Setor Administrativo</div>
            <a href="/dashboard" th:classappend="${currentPage == 'dashboard'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard Executivo
            </a>
            <a href="/work-orders" th:classappend="${currentPage == 'work-orders'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="file-text" class="w-4 h-4"></i> Ordens de Serviço
            </a>
            <a href="/receivables" th:classappend="${currentPage == 'receivables'} ? 'bg-emerald-50 text-emerald-600 border-l-4 border-emerald-600 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="trending-up" class="w-4 h-4"></i> Contas a Receber
            </a>
            <a href="/payables" th:classappend="${currentPage == 'payables'} ? 'bg-rose-50 text-rose-600 border-l-4 border-rose-600 dark:bg-rose-500/10 dark:text-rose-400 dark:border-rose-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="trending-down" class="w-4 h-4"></i> Contas a Pagar
            </a>
            <a href="/losses" th:classappend="${currentPage == 'losses'} ? 'bg-amber-50 text-amber-600 border-l-4 border-amber-500 dark:bg-amber-500/10 dark:text-amber-400 dark:border-amber-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="alert-triangle" class="w-4 h-4"></i> Controle de Perdas
            </a>
            <a href="/dre" th:classappend="${currentPage == 'dre'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="bar-chart-3" class="w-4 h-4"></i> DRE Gerencial
            </a>
            <a href="/conciliation" th:classappend="${currentPage == 'conciliation'} ? 'bg-indigo-50 text-indigo-600 border-l-4 border-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-400 dark:border-indigo-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="landmark" class="w-4 h-4"></i> Conciliação
            </a>
            <a href="/suppliers" th:classappend="${currentPage == 'suppliers'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="truck" class="w-4 h-4"></i> Fornecedores
            </a>
            <a href="/settings" th:classappend="${currentPage == 'settings'} ? 'bg-brand-50 text-brand-600 border-l-4 border-brand-600 dark:bg-cyan-500/10 dark:text-cyan-400 dark:border-cyan-400' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 border-l-4 border-transparent'" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg transition-all text-sm font-semibold">
                <i data-lucide="settings" class="w-4 h-4"></i> Configurações
            </a>
        </div>
    </nav>

    <div class="border-t border-slate-200 dark:border-slate-800 p-5 shrink-0 bg-white dark:bg-slate-900">
        <button id="themeToggle" class="w-full flex items-center justify-between px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all text-sm">
            <span class="flex items-center gap-3">
                <i id="themeIcon" data-lucide="moon" class="w-4 h-4"></i> Tema
            </span>
            <div class="w-8 h-4 bg-slate-200 dark:bg-brand-600 rounded-full relative">
                <div class="w-4 h-4 bg-white rounded-full absolute top-0 left-0 dark:translate-x-4 transition-transform shadow-sm"></div>
            </div>
        </button>

        <form th:action="@{/logout}" method="POST" class="w-full mt-2">
            <button type="submit" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-500/10 transition-all font-bold text-sm">
                <i data-lucide="log-out" class="w-4 h-4"></i> Sair
            </button>
        </form>
    </div>
</div>

<div th:fragment="lucide-script">
    <script>
        // Inicializa ícones
        lucide.createIcons();

        // Lógica do botão de alternância de Tema
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.setAttribute('data-lucide', 'sun');
                themeToggleBtn.querySelector('span').innerHTML = `<i data-lucide="sun" class="w-5 h-5"></i> Modo Claro`;
            } else {
                themeIcon.setAttribute('data-lucide', 'moon');
                themeToggleBtn.querySelector('span').innerHTML = `<i data-lucide="moon" class="w-5 h-5"></i> Modo Escuro`;
            }
            lucide.createIcons(); // Recarrega o ícone atualizado
        }

        if(themeToggleBtn) {
            updateThemeIcon();
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.add('transition-theme');
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                updateThemeIcon();

                // Dispara evento customizado para gráficos recarregarem cores se necessário
                window.dispatchEvent(new Event('themeChanged'));

                setTimeout(() => {
                    document.documentElement.classList.remove('transition-theme');
                }, 300);
            });
        }
    </script>
</div>

</body>
</html>
