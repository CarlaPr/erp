<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Configurações - Alfatahi ERP')}"></head>
<body class="bg-slate-900 flex">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<main class="ml-64 p-8 w-full min-h-screen text-slate-200">
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-white">Configurações Gerais</h2>
        <p class="text-slate-400">Gerencie os dados institucionais da empresa utilizados em relatórios e orçamentos.</p>
    </header>

    <div th:if="${param.success}" class="max-w-2xl mb-4 p-4 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm flex items-center gap-2">
        <i data-lucide="check-circle" class="w-5 h-5"></i> Alterações gravadas com sucesso!
    </div>

    <div class="max-w-2xl bg-slate-800 rounded-xl border border-slate-700 shadow-xl overflow-hidden">
        <form th:action="@{/settings/save}" th:object="${profile}" method="POST" class="p-6 space-y-6 text-sm">
            <input type="hidden" th:field="*{id}" />

            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-slate-400 mb-1 font-medium">Nome da Empresa / Razão Social</label>
                    <input type="text" th:field="*{companyName}" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Nome do Proprietário</label>
                    <input type="text" th:field="*{ownerName}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-medium">NIF / Documento</label>
                    <input type="text" th:field="*{document}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-medium">E-mail de Contacto</label>
                    <input type="email" th:field="*{email}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Telefone</label>
                    <input type="text" th:field="*{phone}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div class="col-span-2">
                    <label class="block text-slate-400 mb-1 font-medium">Endereço da Sede</label>
                    <input type="text" th:field="*{address}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-medium">Cidade</label>
                    <input type="text" th:field="*{city}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>

                <div>
                    <label class="block text-slate-400 mb-1 font-medium">URL do Logótipo (Link Externo)</label>
                    <input type="text" th:field="*{logoUrl}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                </div>
            </div>

            <div>
                <label class="block text-slate-400 mb-1 font-medium">URL da Imagem da Assinatura (Link Externo)</label>
                <input type="text" th:field="*{signatureUrl}" placeholder="https://link-da-imagem.png" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
            </div>

            <div class="flex justify-end pt-4 border-t border-slate-700">
                <button type="submit" class="bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold px-6 py-2 rounded-lg flex items-center gap-2 transition-colors">
                    <i data-lucide="save" class="w-4 h-4"></i> Gravar Configurações
                </button>
            </div>
        </form>
    </div>
</main>

<div th:replace="~{fragments/layout :: lucide-script}"></div>
</body>
</html>
