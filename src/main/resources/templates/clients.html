<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head th:replace="~{fragments/layout :: head('Clientes - Tahi Glass ERP')}"></head>
<body class="bg-slate-50 dark:bg-[#0B1120] flex font-sans text-slate-800 dark:text-slate-200">

<div th:replace="~{fragments/layout :: sidebar}"></div>
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="lg:ml-72 px-4 sm:px-6 lg:px-8 pb-4 sm:pb-6 lg:pb-8 pt-20 lg:pt-8 w-full min-h-screen transition-colors duration-300">
    <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-slate-200 dark:border-slate-800/80 pb-5 gap-4">
        <div>
            <h2 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Clientes</h2>
            <p class="text-base text-slate-500 dark:text-slate-400 mt-1">Gerenciamento da carteira de clientes do sistema.</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-brand-600 hover:bg-brand-700 text-white dark:bg-cyan-500 dark:hover:bg-cyan-600 dark:text-slate-900 font-bold px-5 py-2.5 rounded-xl flex items-center gap-2 transition-all shadow-md shadow-brand-500/20 dark:shadow-cyan-500/20">
            <i data-lucide="user-plus" class="w-5 h-5"></i> Novo Cliente
        </button>
    </header>

    <div class="bg-white dark:bg-[#131C2F] rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[720px]">
            <thead>
            <tr class="border-b border-slate-200 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 font-bold text-sm uppercase tracking-wider">
                <th class="p-5">Nome</th>
                <th class="p-5">Documento</th>
                <th class="p-5">Contato</th>
                <th class="p-5">Cidade</th>
                <th class="p-5">Tipo</th>
                <th class="p-5 text-center">Ações</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-700/50 text-sm">
            <tr th:each="client : ${clients}" class="hover:bg-slate-50 dark:hover:bg-slate-700/30 transition-colors">
                <td class="p-5 font-bold text-slate-900 dark:text-white text-base" th:text="${client.name}">Nome do Cliente</td>
                <td class="p-5 text-slate-600 dark:text-slate-300 font-mono" th:text="${client.document}">000.000.000-00</td>
                <td class="p-5">
                    <div class="text-slate-700 dark:text-slate-300 font-medium" th:text="${client.email}">email@teste.com</div>
                    <div class="text-slate-500 text-sm mt-1" th:text="${client.phone}">(11) 99999-9999</div>
                </td>
                <td class="p-5 text-slate-600 dark:text-slate-300 font-medium" th:text="${client.city}">Itaquaquecetuba</td>
                <td class="p-5">
                    <span th:if="${client.type == 'individual'}" class="px-3 py-1 rounded-lg text-xs font-bold bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400 border border-emerald-200 dark:border-transparent">Física</span>
                    <span th:if="${client.type == 'company'}" class="px-3 py-1 rounded-lg text-xs font-bold bg-indigo-100 text-indigo-700 dark:bg-purple-500/10 dark:text-purple-400 border border-indigo-200 dark:border-transparent">Jurídica</span>
                </td>
                <td class="p-5 text-center space-x-3">
                    <a th:href="@{/clients/edit/{id}(id=${client.id})}" class="text-brand-600 hover:text-brand-800 dark:text-cyan-400 dark:hover:text-cyan-300 inline-block transition-colors p-2 rounded-lg hover:bg-brand-50 dark:hover:bg-cyan-500/10" title="Editar">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </a>
                    <form th:action="@{/clients/delete/{id}(id=${client.id})}" method="POST" class="inline-block">
                        <input type="hidden" name="_method" value="DELETE" />
                        <button type="submit" onclick="return confirm('Deseja realmente excluir este registo?')" class="text-rose-600 hover:text-rose-800 dark:text-rose-500 dark:hover:text-rose-400 transition-colors p-2 rounded-lg hover:bg-rose-50 dark:hover:bg-rose-500/10" title="Excluir">
                            <i data-lucide="trash-2" class="w-5 h-5 inline"></i>
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(clients)}">
                <td colspan="6" class="p-10 text-center text-slate-500 font-medium text-base">
                    Nenhum cliente cadastrado ainda.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="clientModal" th:class="${isEditing} ? 'fixed inset-0 bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto' : 'fixed inset-0 bg-slate-900/50 dark:bg-slate-950/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4 overflow-y-auto'">
        <div class="bg-white dark:bg-[#131C2F] border border-slate-200 dark:border-slate-700 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200">
            <header class="p-6 border-b border-slate-200 dark:border-slate-700/50 flex justify-between items-center bg-slate-50 dark:bg-slate-800/30">
                <h3 class="text-xl font-bold text-slate-900 dark:text-white" th:text="${isEditing} ? 'Editar Cliente' : 'Cadastrar Novo Cliente'">Formulário</h3>
                <a href="/clients" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors bg-white dark:bg-transparent p-1.5 rounded-lg border border-slate-200 dark:border-transparent">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </a>
            </header>

            <form th:action="@{/clients/save}" th:object="${newClient}" method="POST" class="p-6 space-y-5">

                <input type="hidden" th:field="*{id}" />
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            Nome Completo / Razão Social *
                        </label>
                        <input
                                type="text"
                                th:field="*{name}"
                                required
                                maxlength="150"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            Tipo de Pessoa
                        </label>
                        <select
                                id="type"
                                th:field="*{type}"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5">
                            <option value="individual">
                                Pessoa Física (CPF)
                            </option>
                            <option value="company">
                                Pessoa Jurídica (CNPJ)
                            </option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            CPF / CNPJ
                        </label>
                        <input
                                id="document"
                                type="text"
                                th:field="*{document}"
                                maxlength="18"
                                autocomplete="off"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                        <p id="documentError"
                           class="hidden text-red-500 text-sm mt-1">
                        </p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            E-mail
                        </label>
                        <input
                                id="email"
                                type="email"
                                th:field="*{email}"
                                maxlength="120"
                                autocomplete="off"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                        <p id="emailError"
                           class="hidden text-red-500 text-sm mt-1">
                        </p>

                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            Telefone
                        </label>
                        <input
                                id="phone"
                                type="text"
                                th:field="*{phone}"
                                maxlength="15"
                                autocomplete="off"
                                placeholder="(11) 99999-9999"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                        <p id="phoneError"
                           class="hidden text-red-500 text-sm mt-1">
                        </p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            CEP
                        </label>
                        <input
                                id="cep"
                                type="text"
                                maxlength="9"
                                placeholder="00000-000"
                                autocomplete="off"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                        <p id="cepError" class="hidden text-red-500 text-sm mt-1"></p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            Cidade
                        </label>
                        <input
                                id="city"
                                type="text"
                                th:field="*{city}"
                                maxlength="100"
                                autocomplete="off"
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                        <p id="cityError" class="hidden text-red-500 text-sm mt-1"></p>
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-400 mb-1.5">
                            Endereço Completo (Rua, Número, Bairro, UF)
                        </label>
                        <input
                                id="address"
                                type="text"
                                th:field="*{address}"
                                maxlength="250"
                                placeholder="Será preenchido automaticamente ao digitar o CEP..."
                                class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-xl px-4 py-2.5"
                        />
                        <p id="addressError" class="hidden text-red-500 text-sm mt-1"></p>
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-5 border-t border-slate-200 dark:border-slate-700 mt-8">
                    <a href="/clients" class="px-5 py-2.5 rounded-xl border border-slate-300 dark:border-slate-700">
                        Cancelar
                    </a>
                    <button type="submit" class="px-5 py-2.5 rounded-xl bg-brand-600 text-white">
                        Salvar Cliente
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

    function toggleModal(show) {
        const modal = document.getElementById('clientModal');

        if (show) {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        } else {
            modal.classList.remove('flex');
            modal.classList.add('hidden');
        }
    }

    const phoneInput = document.getElementById("phone");
    const documentInput = document.getElementById("document");
    const typeInput = document.getElementById("type");

    function onlyNumbers(value) {
        return value.replace(/\D/g, '');
    }

    function formatCPF(value) {
        value = onlyNumbers(value).slice(0, 11);

        return value
            .replace(/(\d{3})(\d)/, '$1.$2')
            .replace(/(\d{3})(\d)/, '$1.$2')
            .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    }

    function formatCNPJ(value) {
        value = onlyNumbers(value).slice(0, 14);

        return value
            .replace(/^(\d{2})(\d)/, '$1.$2')
            .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
            .replace(/\.(\d{3})(\d)/, '.$1/$2')
            .replace(/(\d{4})(\d)/, '$1-$2');
    }

    function formatPhone(value) {
        value = onlyNumbers(value).slice(0, 11);

        if (value.length <= 10) {
            return value.replace(
                /^(\d{2})(\d{0,4})(\d{0,4})$/,
                '($1) $2-$3'
            );
        }

        return value.replace(
            /^(\d{2})(\d{0,5})(\d{0,4})$/,
            '($1) $2-$3'
        );
    }

    documentInput?.addEventListener("input", () => {

        if (typeInput.value === "company") {
            documentInput.value =
                formatCNPJ(documentInput.value);
        } else {
            documentInput.value =
                formatCPF(documentInput.value);
        }

    });

    phoneInput?.addEventListener("input", () => {
        phoneInput.value =
            formatPhone(phoneInput.value);
    });

    function showError(id, msg) {

        const el = document.getElementById(id);

        if (!msg) {
            el.classList.add("hidden");
            return;
        }

        el.textContent = msg;
        el.classList.remove("hidden");
    }

    function validateForm(e) {

        let valid = true;
        const doc =
            documentInput.value.trim();
        const phone =
            phoneInput.value.trim();
        const email =
            document.getElementById("email").value.trim();
        const address =
            document.getElementById("address").value.trim();
        const city =
            document.getElementById("city").value.trim();

        if (doc !== "") {
            const numbers =
                onlyNumbers(doc);
            const expected =
                typeInput.value === "company"
                    ? 14
                    : 11;
            if (numbers.length !== expected) {
                showError(
                    "documentError",
                    typeInput.value === "company"
                        ? "CNPJ deve ter 14 números"
                        : "CPF deve ter 11 números"
                );
                valid = false;
            } else {
                showError("documentError");
            }
        }

        if (phone !== "") {
            const numbers =
                onlyNumbers(phone);
            if (
                numbers.length < 10 ||
                numbers.length > 11
            ) {
                showError(
                    "phoneError",
                    "Telefone inválido"
                );
                valid = false;
            } else {
                showError("phoneError");
            }
        }

        if (email !== "") {
            const regex =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!regex.test(email)) {
                showError(
                    "emailError",
                    "E-mail inválido"
                );
                valid = false;
            } else {
                showError("emailError");
            }
        }

        if (address !== "") {
            if (address.length < 5) {
                showError(
                    "addressError",
                    "Endereço muito curto"
                );
                valid = false;
            } else {
                showError("addressError");
            }
        }

        if (city !== "") {
            if (!/^[A-Za-zÀ-ÿ\s]+$/.test(city)) {
                showError(
                    "cityError",
                    "Cidade não pode conter números"
                );
                valid = false;

            } else {
                showError("cityError");
            }
        }
        if (!valid) {e.preventDefault();}
    }

    const cepInput = document.getElementById("cep");
    const addressInput = document.getElementById("address");
    const cityInput = document.getElementById("city");

    cepInput?.addEventListener("input", (e) => {
        let value = e.target.value.replace(/\D/g, '');
        if (value.length > 5) {
            value = value.replace(/^(\d{5})(\d{1,3}).*/, '$1-$2');
        }
        e.target.value = value;

        if (value.length === 9) {
            buscarCep(value);
        }
    });

    async function buscarCep(cep) {
        const cleanCep = cep.replace(/\D/g, '');
        if (cleanCep.length !== 8) return;

        showError('cepError', '');

        try {
            const response = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
            const data = await response.json();

            if (data.erro) {
                showError('cepError', 'CEP não encontrado');
                return;
            }

            if (addressInput) {
                addressInput.value = `${data.logradouro}, Número:     - Bairro: ${data.bairro} - ${data.uf}`;
                addressInput.focus();
            }
            if (cityInput) {
                cityInput.value = data.localidade;
            }
        } catch (err) {
            showError('cepError', 'Falha ao buscar CEP. Verifique a internet.');
        }
    }
    document
        .querySelector("form")
        .addEventListener(
            "submit",
            validateForm
        );

</script>
<div th:replace="~{fragments/layout :: lucide-script}"></div>
</body>
</html>
