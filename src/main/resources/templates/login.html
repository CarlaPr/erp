<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tahi Glass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#0B1120] min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-[#131C2F] border border-slate-800 p-8 rounded-2xl shadow-2xl relative overflow-hidden">

    <div class="text-center mb-8">
        <div class="bg-gradient-to-br from-cyan-400 to-blue-500 p-3 rounded-2xl w-fit mx-auto shadow-xl shadow-cyan-500/10 mb-4">
            <i data-lucide="lock" class="text-slate-900 w-6 h-6"></i>
        </div>
        <h1 class="text-2xl font-black text-white tracking-tight">Tahi Glass</h1>
        <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-bold text-cyan-400">Autenticação</p>
    </div>

    <div th:if="${param.error}" class="mb-4 p-3 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-400 text-xs font-medium flex items-center gap-2">
        <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
        <span>Usuário ou senha inválidos. Tente novamente.</span>
    </div>
    <div th:if="${param.logout}" class="mb-4 p-3 bg-emerald-500/10 border border-emerald-500/20 rounded-xl text-emerald-400 text-xs font-medium flex items-center gap-2">
        <i data-lucide="check-circle" class="w-4 h-4 shrink-0"></i>
        <span>Sessão encerrada com sucesso!</span>
    </div>

    <form th:action="@{/login}" method="POST" class="space-y-5 text-sm">
        <div>
            <label class="block text-slate-400 font-bold mb-1.5 text-xs uppercase tracking-wider">Nome de Usuário</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i data-lucide="user" class="w-4 h-4"></i></span>
                <input type="text" name="username" required placeholder="Ex: admin" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-white focus:border-cyan-500 outline-none transition-all" />
            </div>
        </div>

        <div>
            <label class="block text-slate-400 font-bold mb-1.5 text-xs uppercase tracking-wider">Senha de Acesso</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500"><i data-lucide="key-round" class="w-4 h-4"></i></span>
                <input type="password" name="password" required placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-10 pr-4 py-3 text-white focus:border-cyan-500 outline-none transition-all" />
            </div>
        </div>

        <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-black py-3.5 rounded-xl transition-all shadow-lg shadow-cyan-500/10 mt-6 flex items-center justify-center gap-2">
            Entrar no Painel <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
    </form>
</div>

<div th:if="${param.expired}" id="modalSessao" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
        </div>
        <h3 class="modal-title">Sessão Expirada</h3>
        <p class="modal-text">Sua sessão foi encerrada por inatividade. Por favor, faça o login novamente para continuar.</p>
        <button onclick="fecharModal()" class="modal-btn">Entendi</button>
    </div>
</div>
<style>
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        backdrop-filter: blur(3px);
    }

    .modal-box {
        background-color: #1e293b;
        padding: 30px;
        border-radius: 12px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        animation: popIn 0.3s ease-out forwards;
    }

    .modal-icon {
        margin-bottom: 15px;
    }

    .modal-title {
        color: #ffffff;
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 10px 0;
        font-family: 'Inter', sans-serif;
    }

    .modal-text {
        color: #94a3b8;
        font-size: 15px;
        line-height: 1.5;
        margin: 0 0 25px 0;
        font-family: 'Inter', sans-serif;
    }

    .modal-btn {
        background-color: #0d9488;
        color: #ffffff;
        border: none;
        padding: 10px 24px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: background-color 0.2s;
        font-family: 'Inter', sans-serif;
        width: 100%;
    }

    .modal-btn:hover {
        background-color: #0f766e;
    }

    @keyframes popIn {
        0% { transform: scale(0.9); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }
</style>

<script>lucide.createIcons();

function fecharModal() {

    var modal = document.getElementById("modalSessao");
    if (modal) {
        modal.style.display = "none";
        window.history.replaceState({}, document.title, window.location.pathname);
    }
}
</script>
</body>
</html>
