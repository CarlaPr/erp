<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Ordens de Serviço - Alfatahi ERP')}"></head>
<body class="bg-slate-900 flex">

<div th:replace="~{fragments/layout :: sidebar}"></div>

<main class="ml-64 p-8 w-full min-h-screen text-slate-200">
    <header class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-3xl font-bold text-white">Ordens de Serviço (O.S.)</h2>
            <p class="text-slate-400">Controle de orçamentos, medições e instalações.</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-semibold px-4 py-2 rounded-lg flex items-center gap-2 transition-colors">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> Nova Ordem de Serviço
        </button>
    </header>

    <div class="bg-slate-800 rounded-xl border border-slate-700 shadow-lg overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="border-b border-slate-700 bg-slate-800/50 text-slate-400 font-semibold text-sm">
                <th class="p-4">Nº / Título</th>
                <th class="p-4">Cliente</th>
                <th class="p-4">Dimensões (m)</th>
                <th class="p-4">Área Total</th>
                <th class="p-4">Status</th>
                <th class="p-4 text-center">Ações</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-slate-700 text-sm">
            <tr th:each="wo : ${workOrders}" class="hover:bg-slate-700/30 transition-colors">
                <td class="p-4">
                    <span class="text-cyan-400 font-mono block text-xs" th:text="${wo.number}">OS-1001</span>
                    <span class="text-white font-medium" th:text="${wo.title}">Título da OS</span>
                </td>
                <td class="p-4 text-slate-300" th:text="${wo.client != null ? wo.client.name : 'Não informado'}">Cliente</td>
                <td class="p-4 text-slate-400" th:text="${wo.width != null && wo.height != null} ? ${wo.width} + ' x ' + ${wo.height} : '-'">1.00 x 2.00</td>
                <td class="p-4 font-semibold text-white" th:text="${wo.area != null} ? ${wo.area} + ' m²' : '-'">2.00 m²</td>
                <td class="p-4">
                    <span th:if="${wo.status == 'budget'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-amber-500/10 text-amber-400">Orçamento</span>
                    <span th:if="${wo.status == 'approved'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-blue-500/10 text-blue-400">Aprovado</span>
                    <span th:if="${wo.status == 'in_progress'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-indigo-500/10 text-indigo-400">Em Andamento</span>
                    <span th:if="${wo.status == 'completed'}" class="px-2 py-1 rounded-full text-xs font-semibold bg-emerald-500/10 text-emerald-400">Concluído</span>
                </td>
                <td class="p-4 text-center space-x-2">
                    <a th:href="@{/work-orders/edit/{id}(id=${wo.id})}" class="text-cyan-400 hover:text-cyan-300 inline-block">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </a>
                    <a th:href="@{/work-orders/delete/{id}(id=${wo.id})}" onclick="return confirm('Excluir O.S.?')" class="text-rose-400 hover:text-rose-300 inline-block">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(workOrders)}">
                <td colspan="6" class="p-8 text-center text-slate-500">Nenhuma Ordem de Serviço registrada.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="woModal" th:class="${isEditing} ? 'fixed inset-0 bg-slate-950/70 backdrop-blur-sm flex items-center justify-center z-50' : 'fixed inset-0 bg-slate-950/70 backdrop-blur-sm hidden items-center justify-center z-50'">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-2xl rounded-xl shadow-2xl overflow-hidden">
            <header class="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">
                <h3 class="text-xl font-bold text-white" th:text="${isEditing} ? 'Editar O.S.' : 'Criar Nova O.S.'">Formulário O.S.</h3>
                <a href="/work-orders" class="text-slate-400 hover:text-slate-200"><i data-lucide="x" class="w-6 h-6"></i></a>
            </header>

            <form th:action="@{/work-orders/save}" th:object="${newWorkOrder}" method="POST" class="p-6 space-y-4">
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Título do Projeto / Serviço</label>
                        <input type="text" th:field="*{title}" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Cliente Vinculado</label>
                        <select th:field="*{client}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none">
                            <option value="">-- Selecione o Cliente --</option>
                            <option th:each="c : ${clients}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Status da O.S.</label>
                        <select th:field="*{status}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none">
                            <option value="budget">Orçamento (Budget)</option>
                            <option value="approved">Aprovado</option>
                            <option value="in_progress">Em Andamento</option>
                            <option value="completed">Concluído</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Largura (metros)</label>
                        <input type="number" step="0.01" th:field="*{width}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-1">Altura (metros)</label>
                        <input type="number" step="0.01" th:field="*{height}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>

                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-400 mb-1">Endereço da Instalação</label>
                        <input type="text" th:field="*{installAddress}" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white focus:border-cyan-500 focus:outline-none" />
                    </div>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-slate-700 mt-6">
                    <a href="/work-orders" class="px-4 py-2 rounded-lg bg-slate-700 text-white hover:bg-slate-600 transition-colors">Cancelar</a>
                    <button type="submit" class="px-4 py-2 rounded-lg bg-cyan-500 text-slate-900 font-semibold hover:bg-cyan-600 transition-colors">Salvar O.S.</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    function toggleModal(show) {
        const modal = document.getElementById('woModal');
        if (show) { modal.classList.remove('hidden'); modal.classList.add('flex'); }
        else { modal.classList.remove('flex'); modal.classList.add('hidden'); }
    }
</script>
<div th:replace="~{fragments/layout :: lucide-script}"></div>
</body>
</html>
