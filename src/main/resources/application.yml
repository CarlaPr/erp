spring:
  datasource:
    # Adicionado ;AUTO_SERVER=TRUE no final da linha para evitar locks de arquivo
    url: jdbc:h2:file:./data/alfatahi_db;AUTO_SERVER=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console